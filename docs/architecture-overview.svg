<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cursorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">Claude Code + Cursor Agent Orchestration</text>

  <!-- User -->
  <rect x="350" y="60" width="200" height="45" rx="8" fill="#6366F1" filter="url(#shadow)"/>
  <text x="450" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="white">User</text>

  <!-- Arrow: User -> Claude Code -->
  <line x1="450" y1="105" x2="450" y2="140" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <defs><marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6366F1"/></marker></defs>

  <!-- Claude Code Box -->
  <rect x="50" y="140" width="800" height="200" rx="12" fill="white" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="140" width="800" height="35" rx="12" fill="url(#claudeGrad)"/>
  <rect x="50" y="163" width="800" height="12" fill="url(#claudeGrad)"/>
  <text x="450" y="163" text-anchor="middle" font-size="15" font-weight="700" fill="white">Claude Code (Orchestrator)</text>

  <!-- Hook -->
  <rect x="80" y="195" width="140" height="55" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="150" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Hook</text>
  <text x="150" y="236" text-anchor="middle" font-size="9" fill="#92400E">UserPromptSubmit</text>

  <!-- Skill -->
  <rect x="250" y="195" width="140" height="55" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="320" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Skill</text>
  <text x="320" y="236" text-anchor="middle" font-size="9" fill="#92400E">/app-development</text>

  <!-- Phase Pipeline -->
  <rect x="420" y="185" width="410" height="75" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="625" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Phase Pipeline</text>
  <!-- Phase boxes -->
  <rect x="435" y="212" width="38" height="22" rx="3" fill="#D97706"/><text x="454" y="227" text-anchor="middle" font-size="8" fill="white">Ph0</text>
  <rect x="478" y="212" width="38" height="22" rx="3" fill="#D97706"/><text x="497" y="227" text-anchor="middle" font-size="8" fill="white">Ph1</text>
  <rect x="521" y="212" width="38" height="22" rx="3" fill="#D97706"/><text x="540" y="227" text-anchor="middle" font-size="8" fill="white">Ph2</text>
  <rect x="564" y="212" width="38" height="22" rx="3" fill="#D97706"/><text x="583" y="227" text-anchor="middle" font-size="8" fill="white">Ph3</text>
  <rect x="607" y="212" width="38" height="22" rx="3" fill="#D97706"/><text x="626" y="227" text-anchor="middle" font-size="8" fill="white">Ph4</text>
  <rect x="650" y="212" width="38" height="22" rx="3" fill="#D97706"/><text x="669" y="227" text-anchor="middle" font-size="8" fill="white">Ph5</text>
  <rect x="693" y="212" width="38" height="22" rx="3" fill="#D97706"/><text x="712" y="227" text-anchor="middle" font-size="8" fill="white">Ph6</text>
  <rect x="736" y="212" width="38" height="22" rx="3" fill="#D97706"/><text x="755" y="227" text-anchor="middle" font-size="8" fill="white">Ph7</text>
  <rect x="779" y="212" width="38" height="22" rx="3" fill="#D97706"/><text x="798" y="227" text-anchor="middle" font-size="8" fill="white">Ph8</text>

  <!-- Arrow labels -->
  <text x="190" y="215" font-size="9" fill="#92400E">auto-detect</text>
  <path d="M220 220 L250 220" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <path d="M390 220 L420 220" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <defs><marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#D97706"/></marker></defs>

  <!-- Claude owns: design, review, deploy -->
  <text x="230" y="310" text-anchor="middle" font-size="10" fill="#92400E" font-style="italic">Claude owns: design, review, git, deploy</text>

  <!-- Arrow: Claude -> Bridge -->
  <line x1="450" y1="340" x2="450" y2="370" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="520" y="360" font-size="10" fill="#059669" font-weight="600">python3 cursor_dispatch.py</text>
  <defs><marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#059669"/></marker></defs>

  <!-- CursorACP Bridge -->
  <rect x="150" y="370" width="600" height="70" rx="12" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="150" y="370" width="600" height="28" rx="12" fill="url(#bridgeGrad)"/>
  <rect x="150" y="388" width="600" height="10" fill="url(#bridgeGrad)"/>
  <text x="450" y="391" text-anchor="middle" font-size="13" font-weight="700" fill="white">CursorACP Bridge (Python)</text>

  <!-- 3 Modes -->
  <rect x="175" y="408" width="130" height="24" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="240" y="424" text-anchor="middle" font-size="10" fill="#065F46">Single Task</text>

  <rect x="330" y="408" width="130" height="24" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="395" y="424" text-anchor="middle" font-size="10" fill="#065F46">Parallel Tasks</text>

  <rect x="485" y="408" width="130" height="24" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="550" y="424" text-anchor="middle" font-size="10" fill="#065F46">A2A Loop</text>

  <text x="690" y="424" font-size="9" fill="#059669" font-style="italic">JSONL stream</text>

  <!-- Arrow: Bridge -> Cursor -->
  <line x1="450" y1="440" x2="450" y2="470" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="520" y="460" font-size="10" fill="#2563EB" font-weight="600">cursor-agent CLI</text>
  <defs><marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/></marker></defs>

  <!-- Cursor Agent Box -->
  <rect x="150" y="470" width="600" height="70" rx="12" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <rect x="150" y="470" width="600" height="28" rx="12" fill="url(#cursorGrad)"/>
  <rect x="150" y="488" width="600" height="10" fill="url(#cursorGrad)"/>
  <text x="450" y="491" text-anchor="middle" font-size="13" font-weight="700" fill="white">Cursor Agent (Worker)</text>

  <rect x="175" y="508" width="130" height="24" rx="4" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="240" y="524" text-anchor="middle" font-size="10" fill="#1E40AF">Code Generate</text>

  <rect x="330" y="508" width="130" height="24" rx="4" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="395" y="524" text-anchor="middle" font-size="10" fill="#1E40AF">File Edit</text>

  <rect x="485" y="508" width="130" height="24" rx="4" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="550" y="524" text-anchor="middle" font-size="10" fill="#1E40AF">Tool Execution</text>

  <!-- A2A return arrow -->
  <path d="M 770 490 Q 830 420 770 405" stroke="#059669" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="830" y="445" font-size="9" fill="#059669" font-weight="600">A2A</text>
  <text x="822" y="457" font-size="8" fill="#059669">resume</text>

  <!-- Footer -->
  <text x="450" y="575" text-anchor="middle" font-size="10" fill="#94A3B8">Claude Code = brain (design, review, deploy) | Cursor Agent = hands (implement, edit, test)</text>
</svg>
